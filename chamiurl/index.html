<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netlify to GitHub Uploader</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-align: center; max-width: 450px; width: 100%; }
        .drop-zone { border: 2px dashed #00ad9f; padding: 30px; border-radius: 8px; cursor: pointer; background: #fafafa; }
        input[type="file"] { display: none; }
        button { background-color: #00ad9f; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 15px; width: 100%; font-weight: bold; }
        button:hover { background-color: #008e83; }
        .loading { display: none; margin-top: 15px; color: #666; }
        .result-box { display: none; margin-top: 20px; background: #e6f7f6; padding: 15px; border-left: 5px solid #00ad9f; border-radius: 4px; text-align: left; }
        .result-box input { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        #preview { max-width: 100%; max-height: 150px; margin-top: 15px; border-radius: 6px; display: none; }
    </style>
</head>
<body>

<div class="box">
    <h2>Netlify Image Uploader</h2>
    <div class="drop-zone" onclick="document.getElementById('imageInput').click();">
        <p style="margin: 0; color: #333;">මෙතන ක්ලික් කර පින්තූරය තෝරන්න</p>
        <input type="file" id="imageInput" accept="image/*" onchange="previewImage(event)">
        <img id="preview" src="#" alt="Preview">
    </div>

    <button onclick="uploadImage()">Upload & Get Direct Link</button>
    <div id="loadingStatus" class="loading">Uploading to GitHub...</div>

    <div id="resultBox" class="result-box">
        <strong>Direct Link (Your Domain):</strong>
        <input type="text" id="directLink" readonly>
        <button onclick="navigator.clipboard.writeText(document.getElementById('directLink').value); alert('Copy කරගත්තා!');" style="margin-top: 8px; background:#2ecc71; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">Copy Link</button>
    </div>
</div>

<script>
function previewImage(event) {
    const reader = new FileReader();
    reader.onload = function() {
        const preview = document.getElementById('preview');
        preview.src = reader.result;
        preview.style.display = 'block';
    }
    reader.readAsDataURL(event.target.files[0]);
}

async function uploadImage() {
    const fileInput = document.getElementById('imageInput');
    const loadingStatus = document.getElementById('loadingStatus');
    const resultBox = document.getElementById('resultBox');
    const directLinkInput = document.getElementById('directLink');

    if (fileInput.files.length === 0) {
        alert('කරුණාකර පින්තූරයක් තෝරන්න!');
        return;
    }

    loadingStatus.style.display = 'block';
    resultBox.style.display = 'none';

    const file = fileInput.files[0];
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = async () => {
        const base64Data = reader.result.split(',')[1];
        // File name එක unique කරන්න timestamps එකතු කර ඇත
        const filename = `img_${Date.now()}_${file.name.replace(/\s+/g, '_')}`;

        try {
            const response = await fetch('/.netlify/functions/upload', {
                method: 'POST',
                body: JSON.stringify({ filename, image: base64Data }),
                headers: { 'Content-Type': 'application/json' }
            });

            const data = await response.json();

            if (response.ok && data.path) {
                const currentHost = window.location.origin;
                directLinkInput.value = `${currentHost}/${data.path}`;
                resultBox.style.display = 'block';
            } else {
                alert('Upload failed: ' + (data.error || 'Unknown error'));
            }
        } catch (error) {
            alert('Error uploading image!');
        } finally {
            loadingStatus.style.display = 'none';
        }
    };
}
</script>
</body>
</html>
