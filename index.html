<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netlify File Uploader (Image & MP3)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-align: center; max-width: 450px; width: 100%; }
        .drop-zone { border: 2px dashed #00ad9f; padding: 30px; border-radius: 8px; cursor: pointer; background: #fafafa; transition: 0.3s; }
        .drop-zone:hover { background: #eaf8f7; }
        input[type="file"] { display: none; }
        button { background-color: #00ad9f; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 15px; width: 100%; font-weight: bold; }
        button:hover { background-color: #008e83; }
        .loading { display: none; margin-top: 15px; color: #666; font-weight: bold; }
        .result-box { display: none; margin-top: 20px; background: #e6f7f6; padding: 15px; border-left: 5px solid #00ad9f; border-radius: 4px; text-align: left; }
        .result-box input { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px;}
        
        /* Preview Styles */
        #imagePreview { max-width: 100%; max-height: 150px; margin-top: 15px; border-radius: 6px; display: none; margin-left: auto; margin-right: auto; }
        #audioPreview { width: 100%; margin-top: 15px; display: none; }
        .file-name-display { margin-top: 10px; font-size: 14px; color: #555; font-weight: bold; word-break: break-all; }
    </style>
</head>
<body>

<div class="box">
    <h2>Image & MP3 Uploader</h2>
    <div class="drop-zone" onclick="document.getElementById('fileInput').click();">
        <p style="margin: 0; color: #333; font-weight: bold;">මෙතන ක්ලික් කර Image එකක් හෝ MP3 එකක් තෝරන්න</p>
        
        <!-- Accept Images & Audio -->
        <input type="file" id="fileInput" accept="image/*, audio/mp3, audio/mpeg" onchange="previewFile(event)">
        
        <!-- Previews -->
        <img id="imagePreview" src="#" alt="Image Preview">
        <audio id="audioPreview" controls></audio>
        <div id="fileNameDisplay" class="file-name-display"></div>
    </div>

    <button onclick="uploadFile()">Upload & Get Direct Link</button>
    <div id="loadingStatus" class="loading">Uploading to GitHub... Please wait.</div>

    <div id="resultBox" class="result-box">
        <strong>Direct Link (Your Domain):</strong>
        <input type="text" id="directLink" readonly>
        <button onclick="copyLink()" style="margin-top: 8px; background:#2ecc71; color:white; border:none; padding:8px 10px; border-radius:4px; cursor:pointer;">Copy Link</button>
    </div>
</div>

<script>
function previewFile(event) {
    const file = event.target.files[0];
    if (!file) return;

    const imagePreview = document.getElementById('imagePreview');
    const audioPreview = document.getElementById('audioPreview');
    const fileNameDisplay = document.getElementById('fileNameDisplay');
    
    // Hide previews initially
    imagePreview.style.display = 'none';
    audioPreview.style.display = 'none';
    
    // Display File Name
    fileNameDisplay.innerText = "Selected: " + file.name;

    const reader = new FileReader();
    reader.onload = function() {
        if (file.type.startsWith('image/')) {
            imagePreview.src = reader.result;
            imagePreview.style.display = 'block';
        } else if (file.type.startsWith('audio/')) {
            audioPreview.src = reader.result;
            audioPreview.style.display = 'block';
        }
    }
    reader.readAsDataURL(file);
}

async function uploadFile() {
    const fileInput = document.getElementById('fileInput');
    const loadingStatus = document.getElementById('loadingStatus');
    const resultBox = document.getElementById('resultBox');
    const directLinkInput = document.getElementById('directLink');

    if (fileInput.files.length === 0) {
        alert('කරුණාකර File එකක් තෝරන්න!');
        return;
    }

    loadingStatus.style.display = 'block';
    resultBox.style.display = 'none';

    const file = fileInput.files[0];
    const reader = new FileReader();
    reader.readAsDataURL(file);
    
    reader.onload = async () => {
        const base64Data = reader.result.split(',')[1];
        // File name එක unique කරන්න
        const filename = `file_${Date.now()}_${file.name.replace(/\s+/g, '_')}`;

        try {
            const response = await fetch('/.netlify/functions/upload', {
                method: 'POST',
                body: JSON.stringify({ filename, image: base64Data }), // Backend expects 'image' key
                headers: { 'Content-Type': 'application/json' }
            });

            const data = await response.json();

            if (response.ok && data.path) {
                const currentHost = window.location.origin;
                directLinkInput.value = `${currentHost}/${data.path}`;
                resultBox.style.display = 'block';
            } else {
                alert('Upload failed: ' + (data.error || 'Unknown error'));
            }
        } catch (error) {
            alert('Error uploading file!');
        } finally {
            loadingStatus.style.display = 'none';
        }
    };
}

function copyLink() {
    const linkInput = document.getElementById('directLink');
    linkInput.select();
    linkInput.setSelectionRange(0, 99999); // For mobile devices
    navigator.clipboard.writeText(linkInput.value);
    alert('Link එක Copy කරගත්තා!');
}
</script>
</body>
</html>
