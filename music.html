<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Music</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-brand">DevUpload</a>
        <div class="nav-links">
            <a href="img.html">Images</a>
            <a href="music.html" style="color: #00ffcc;">Music</a>
            <a href="gif.html">GIFs</a>
        </div>
    </nav>

    <div class="container">
        <div class="glass-box">
            <h2>🎵 Upload Music</h2>
            <div class="drop-zone" onclick="document.getElementById('fileInput').click();">
                <p id="fileName">Click here to select an MP3 File</p>
                <input type="file" id="fileInput" accept="audio/*" style="display: none;" onchange="previewFile(event)">
                <audio id="preview" controls style="display: none; width: 100%; margin-top: 20px;"></audio>
            </div>

            <button class="btn-3d" onclick="uploadFile()">Upload & Generate Link</button>
            <div id="loading" style="display: none; margin-top: 15px; font-weight: bold; color: #00ffcc;">Uploading... Please wait ⚡</div>

            <div id="resultBox" class="result-box">
                <strong>Your Direct Link:</strong>
                <input type="text" id="directLink" class="input-link" readonly>
                <button class="btn-3d copy-btn" onclick="copyLink()">📋 Copy Link</button>
            </div>
        </div>
    </div>

    <script>
        function previewFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            document.getElementById('fileName').innerText = "Selected: " + file.name;
            const preview = document.getElementById('preview');
            const reader = new FileReader();
            reader.onload = function() {
                preview.src = reader.result;
                preview.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const loading = document.getElementById('loading');
            const resultBox = document.getElementById('resultBox');
            const directLinkInput = document.getElementById('directLink');

            if (fileInput.files.length === 0) return alert('Please select an audio file!');
            
            loading.style.display = 'block';
            resultBox.style.display = 'none';

            try {
                // Step 1: Fetch the best available Gofile server
                const serverRes = await fetch('https://api.gofile.io/contents/upload/server');
                if (!serverRes.ok) throw new Error('Server is busy. Please try again later.');
                
                const serverData = await serverRes.json();
                const serverName = serverData.data.server;

                // Step 2: Prepare the audio file for upload
                const file = fileInput.files[0];
                const formData = new FormData();
                formData.append('file', file);

                // Step 3: Upload directly to Gofile server
                const uploadRes = await fetch(`https://${serverName}.gofile.io/contents/upload/file`, {
                    method: 'POST',
                    body: formData
                });

                const result = await uploadRes.json();

                // Step 4: Display the download link if successful
                if (result.status === 'ok') {
                    directLinkInput.value = result.data.downloadPage;
                    resultBox.style.display = 'block';
                } else {
                    alert('Upload failed! Server did not respond properly.');
                }

            } catch (error) {
                console.error(error);
                alert('Error: ' + error.message);
            } finally {
                loading.style.display = 'none';
            }
        }

        function copyLink() {
            const linkInput = document.getElementById('directLink');
            linkInput.select();
            linkInput.setSelectionRange(0, 99999); // Mobile compatibility
            navigator.clipboard.writeText(linkInput.value);
            alert('Copied to clipboard! ✅');
        }
    </script>
</body>
</html>
